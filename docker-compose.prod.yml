### docker-compose.prod.yml (Production environment)
services:
  api:     
    image: luongtuananh/modular-monolith-ddd-backend-api:prod
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - SQLSERVER_HOST=${SQLSERVER_HOST}
      - SQLSERVER_HOST_PORT=${SQLSERVER_HOST_PORT}
      - SQLSERVER_DATABASE_NAME=${SQLSERVER_DATABASE_NAME}
      - SQLSERVER_USER=${SQLSERVER_USER}
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}
    ports:
      - "${API_HOST_PORT}:${API_DOCKER_CONTAINER_PORT}"
    restart: always
    networks: 
      - modular-monolith-network
  
  frontend-admin:       
    image: luongtuananh/modular-monolith-ddd-frontend-admin:prod
    environment:
      - API_HOST_PORT=${API_HOST_PORT}
      - API_DOCKER_CONTAINER_PORT=${API_DOCKER_CONTAINER_PORT}
      - ADMIN_HOST_PORT=${ADMIN_HOST_PORT}  
    ports:
      - "${ADMIN_HOST_PORT}:${ADMIN_DOCKER_CONTAINER_PORT}" 
    restart: always 
    networks: 
      - modular-monolith-network
  
  database:
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - ACCEPT_EULA=Y
    ports:
      - "${SQLSERVER_HOST_PORT}:${SQLSERVER_DOCKER_CONTAINER_PORT}"
    volumes:
      - vol_sqlserver_prod:/var/opt/mssql
      - ./modular-monolith-ddd/src/Database:/docker-entrypoint-initdb.d   
    restart: always
    networks: 
      - modular-monolith-network
  
  liquibase:   
    environment:
      # jdbc:sqlserver://database:1433
      LIQUIBASE_COMMAND_URL: jdbc:sqlserver://${SQLSERVER_SERVICE_NAME}:${SQLSERVER_DOCKER_CONTAINER_PORT};databaseName=${SQLSERVER_DATABASE_NAME};encrypt=false
      LIQUIBASE_COMMAND_USERNAME: ${SQLSERVER_USER}
      LIQUIBASE_COMMAND_PASSWORD: ${SQLSERVER_PASSWORD}  
    restart: "no"
    networks: 
      - modular-monolith-network 

volumes:
  vol_sqlserver_prod: