### docker-compose.yml (BASE - common for all environments)
services:     
  db-sqlserver:
    container_name: mmdddshop-db-sqlserver  
    image: mcr.microsoft.com/mssql/server:2019-CU27-ubuntu-20.04
    environment:     
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"  
    ports:
      - "${SQLSERVER_HOST_PORT}:${SQLSERVER_DOCKER_CONTAINER_PORT}"
    volumes:
      - mmdddshop-sqlserver:/var/opt/mssql     
    # Configure shared memory size for the SQL Server container
    # SQL Server requires shared memory for connection pooling and internal operations
    # Default is 64MB which is often insufficient for production workloads
    # Increase shared memory from 64MB to 2GB for connection pooling    
    shm_size: 2g    # Allocate 2GB of shared memory (increased from default 64MB)
    # Configure resource limits and reservations for the SQL Server container
    # This ensures optimal performance and prevents resource exhaustion
    deploy:
      resources:
        # Maximum resource limits - container cannot exceed these values
        limits:
          memory: 4G    # Maximum 4GB RAM allocation
          cpus: '2.0'   # Maximum 2 CPU cores allocation
        # Minimum resource reservations - guaranteed resources for the container
        reservations:
          memory: 2G    # Guaranteed 2GB RAM allocation
          cpus: '1.0'   # Guaranteed 1 CPU core allocation
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -Q \"SELECT 1\" -b"]
      # test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -d ModularMonolithDDDShop -Q \"SET NOCOUNT ON; SELECT COUNT(*) FROM sys.database_principals WHERE name='app_admin'\" -h -1 -W | grep -q 1"]
      # test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -Q \"SET NOCOUNT ON; SELECT COUNT(*) FROM sys.server_principals WHERE name='app_admin'\" -h -1 -W | grep -q 1"]
      # test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -Q 'SELECT 1'"]
      interval: 10s # Check every 10 seconds
      retries: 10 # Retry up to 5 times before marking as unhealthy
      timeout: 5s # Each check must complete within 5 seconds
      start_period: 30s # Wait 20 seconds after container starts before beginning health checks            
     # command: >
      #/bin/bash -c "(export SA_PASSWORD=${SA_PASSWORD} && /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -i /docker-entrypoint-initdb.d/CreateDatabase_Linux.sql &) && /opt/mssql/bin/sqlservr"
    networks:
      - mmdddshop-network    
  
  db-init:
    container_name:  mmdddshop-db-init  
    image: luongtuananh/mmdddshop-db-init
    build:
      context: ./mmdddshop-backend/src/Database
      dockerfile: Dockerfile_db_init
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      SQLSERVER_SERVICE_NAME: ${SQLSERVER_SERVICE_NAME}
      SQLSERVER_DOCKER_CONTAINER_PORT: ${SQLSERVER_DOCKER_CONTAINER_PORT}
    depends_on:
      db-sqlserver:
        condition: service_healthy
    networks:
      - mmdddshop-network
    restart: "no"
  
  liquibase:   
    container_name: mmdddshop-liquibase
    image: luongtuananh/mmdddshop-liquibase:${IMAGE_TAG:-prod}
    build:
      context: ./mmdddshop-backend/src/Database/liquibase
      dockerfile: Dockerfile_liquibase
    environment:
      # jdbc:sqlserver://db-sqlserver:1433
      LIQUIBASE_COMMAND_URL: jdbc:sqlserver://${SQLSERVER_SERVICE_NAME}:${SQLSERVER_DOCKER_CONTAINER_PORT};databaseName=${SQLSERVER_DATABASE_NAME};encrypt=false
      LIQUIBASE_COMMAND_USERNAME: ${SQLSERVER_USER}
      LIQUIBASE_COMMAND_PASSWORD: ${SQLSERVER_PASSWORD}
    # command: ["update", "--changelog-file=changelog.xml"]
    # volumes:
    #   - ./mmdddshop-backend/src/Database/liquibase/drivers:/liquibase/drivers
    #   - ./mmdddshop-backend/src/Database/liquibase/migrations:/liquibase/migrations
    #   - ./mmdddshop-backend/src/Database/liquibase/changelog.xml:/liquibase/changelog.xml
    #   - ./mmdddshop-backend/src/Database/liquibase/liquibase.properties:/liquibase/liquibase.properties
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - mmdddshop-network
      
volumes:
  mmdddshop-sqlserver:

networks:
  mmdddshop-network:
    driver: bridge
    name: mmdddshop-network