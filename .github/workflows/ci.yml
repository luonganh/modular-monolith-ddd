name: CI

on:
  push:
    branches:
      - main     
      - develop
  pull_request:
    branches:
      - main     
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    # services:
    #   sqlserver:
    #     image: mcr.microsoft.com/mssql/server:2019-CU27-ubuntu-20.04
    #     env:
    #       ACCEPT_EULA: Y
    #       SA_PASSWORD: Alo1234567@@
    #     ports:
    #       - 1433:1433
    #     options: >-
    #       --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Alo1234567@@ -C -Q 'SELECT 1'"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 10

    # env:
    #   SQLSERVER_HOST: localhost
    #   SQLSERVER_HOST_PORT: 1433
    #   SQLSERVER_DATABASE_NAME: ModularMonolithDDDShop
    #   SQLSERVER_USER: sa
    #   SQLSERVER_PASSWORD: Alo1234567@@

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ModularMonolithDDD.sln

      - name: Build
        run: dotnet build ModularMonolithDDD.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ModularMonolithDDD.sln --configuration Release --no-build --filter "TestCategory!=Integration" --verbosity normal

  frontend-admin:
    name: Frontend admin
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mmdddshop-frontend-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mmdddshop-frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
