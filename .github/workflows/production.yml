name: Production Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    
    env:
      IMAGE_TAG: ${{ github.sha }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print image tag
        run: echo "IMAGE_TAG=${IMAGE_TAG}"
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} 

      - name: Create production env file (.env.production) from Github Secrets on Github Runner         
        run: |
            cat > .env.production <<'EOF'
            ASPNETCORE_ENVIRONMENT=Production
            BUILD_CONFIGURATION=Release
            API_HOST=${{ secrets.API_HOST }}
            API_HOST_PORT=${{ secrets.API_HOST_PORT }}
            API_DOCKER_CONTAINER_PORT=${{ secrets.API_DOCKER_CONTAINER_PORT }}
            ADMIN_HOST=${{ secrets.ADMIN_HOST }}
            ADMIN_HOST_PORT=${{ secrets.ADMIN_HOST_PORT }}
            ADMIN_DOCKER_CONTAINER_PORT=${{ secrets.ADMIN_DOCKER_CONTAINER_PORT }}
            PORTAL_HOST=${{ secrets.PORTAL_HOST }}
            PORTAL_HOST_PORT=${{ secrets.PORTAL_HOST_PORT }}
            PORTAL_DOCKER_CONTAINER_PORT=${{ secrets.PORTAL_DOCKER_CONTAINER_PORT }}
            SQLSERVER_HOST=${{ secrets.SQLSERVER_HOST }}
            SQLSERVER_HOST_PORT=${{ secrets.SQLSERVER_HOST_PORT }}
            SQLSERVER_SERVICE_NAME=${{ secrets.SQLSERVER_SERVICE_NAME }}
            SQLSERVER_DOCKER_CONTAINER_PORT=${{ secrets.SQLSERVER_DOCKER_CONTAINER_PORT }}
            SQLSERVER_DATABASE_NAME=${{ secrets.SQLSERVER_DATABASE_NAME }}
            SQLSERVER_USER=${{ secrets.SQLSERVER_USER }}
            SQLSERVER_PASSWORD=${{ secrets.SQLSERVER_PASSWORD }}
            SA_PASSWORD=${{ secrets.SA_PASSWORD }}
            EOF
            
      - name: Build production images with SHA tag
        run: |
          set -euo pipefail
          docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml build

      - name: Push SHA images
        run: |
          set -euo pipefail
          docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml push

      - name: Tag images as prod
        run: |
          set -euo pipefail
          docker tag luongtuananh/mmdddshop-backend-api:${IMAGE_TAG} luongtuananh/mmdddshop-backend-api:prod
          docker tag luongtuananh/mmdddshop-frontend-admin:${IMAGE_TAG} luongtuananh/mmdddshop-frontend-admin:prod          
          docker tag luongtuananh/mmdddshop-liquibase:${IMAGE_TAG} luongtuananh/mmdddshop-liquibase:prod

      - name: Push prod images
        run: |
          set -euo pipefail
          docker push luongtuananh/mmdddshop-backend-api:prod
          docker push luongtuananh/mmdddshop-frontend-admin:prod         
          docker push luongtuananh/mmdddshop-liquibase:prod
          
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}
            
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
                        
            # Create production env file (.env.production) from Github Secrets on VPS Linux
            cat > .env.production <<'EOF'
            COMPOSE_PROJECT_NAME=mmdddshop
            ASPNETCORE_ENVIRONMENT=Production
            BUILD_CONFIGURATION=Release
            API_HOST=${{ secrets.API_HOST }}
            API_HOST_PORT=${{ secrets.API_HOST_PORT }}
            API_DOCKER_CONTAINER_PORT=${{ secrets.API_DOCKER_CONTAINER_PORT }}
            ADMIN_HOST=${{ secrets.ADMIN_HOST }}
            ADMIN_HOST_PORT=${{ secrets.ADMIN_HOST_PORT }}
            ADMIN_DOCKER_CONTAINER_PORT=${{ secrets.ADMIN_DOCKER_CONTAINER_PORT }}
            PORTAL_HOST=${{ secrets.PORTAL_HOST }}
            PORTAL_HOST_PORT=${{ secrets.PORTAL_HOST_PORT }}
            PORTAL_DOCKER_CONTAINER_PORT=${{ secrets.PORTAL_DOCKER_CONTAINER_PORT }}
            SQLSERVER_HOST=${{ secrets.SQLSERVER_HOST }}
            SQLSERVER_HOST_PORT=${{ secrets.SQLSERVER_HOST_PORT }}
            SQLSERVER_SERVICE_NAME=${{ secrets.SQLSERVER_SERVICE_NAME }}
            SQLSERVER_DOCKER_CONTAINER_PORT=${{ secrets.SQLSERVER_DOCKER_CONTAINER_PORT }}
            SQLSERVER_DATABASE_NAME=${{ secrets.SQLSERVER_DATABASE_NAME }}
            SQLSERVER_USER=${{ secrets.SQLSERVER_USER }}
            SQLSERVER_PASSWORD=${{ secrets.SQLSERVER_PASSWORD }}
            SA_PASSWORD=${{ secrets.SA_PASSWORD }}
            EOF
            
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.deploy.yml up -d --remove-orphans